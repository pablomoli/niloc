<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>{% block title %}Epic Map{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='data/EMS-llc-4.png') }}" type="image/png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Epic Map">

  <!-- Theme color -->
  <meta name="theme-color" content="#ec4899">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-180.png') }}">

  <!-- Google Fonts - Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Compiled Tailwind + DaisyUI (production build) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='dist/app.css') }}">

  <!-- Bootstrap CSS removed (issue #28) -->

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Theme variables and compat layer -->

  <!-- Shared CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind-compat.css') }}">

  {% block head_extra %}{% endblock %}
</head>
<body {% block body_attrs %}data-theme="epicmap"{% endblock %}>
  {% block content %}{% endblock %}

  <!-- Alpine.js (global) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
