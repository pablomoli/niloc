<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{% block title %}Epic Map{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='data/EMS-llc-4.png') }}" type="image/png">

  <!-- Google Fonts - Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS v3.4.1 -->
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>

  <!-- DaisyUI v4.6.0 -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />

  <!-- Bootstrap CSS (temporary during migration) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <!-- Tailwind + DaisyUI configuration for EpicMap theme -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'epic-pink': '#FF1393',
            'epic-gray': '#AAAAAA',
            'epic-white': '#FFFFFF'
          },
          fontFamily: {
            'sans': ['Montserrat', 'system-ui', 'sans-serif']
          }
        }
      },
      daisyui: {
        themes: [
          {
            epicmap: {
              "primary": "#FF1393",
              "secondary": "#AAAAAA",
              "accent": "#FFFFFF",
              "neutral": "#2B2D31",
              "base-100": "#FFFFFF",
              "info": "#3ABFF8",
              "success": "#36D399",
              "warning": "#FBBD23",
              "error": "#F87272"
            }
          }
        ]
      }
    }
  </script>

  <!-- Shared CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind-compat.css') }}">

  {% block head_extra %}{% endblock %}
</head>
<body {% block body_attrs %}data-theme="epicmap"{% endblock %}>
  {% block content %}{% endblock %}

  <!-- Alpine.js (global) -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/focus@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
