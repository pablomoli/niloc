<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Epic Surveying</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div class="spa-container login-container">
      <div class="spa-content">
        <div class="spa-form-card login-card">
          <h1>Epic Surveying</h1>
          <h2>Sign In</h2>
          
          <form method="post" class="spa-form">
            <div>
              <label for="username">Username</label>
              <input type="text" id="username" name="username" required class="spa-input" />
            </div>

            <div>
              <label for="password">Password</label>
              <input type="password" id="password" name="password" required class="spa-input" />
            </div>

            <button type="submit" class="spa-btn spa-btn-primary spa-btn-large">
              Sign In
            </button>
          </form>

          {% if error %}
          <div class="flash-message error">
            {{ error }}
          </div>
          {% endif %}
        </div>
      </div>
    </div>

    <style>
      .login-container {
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--color-gray-100) 100%);
      }
      
      .login-card {
        max-width: 400px;
        width: 100%;
        margin: 0 auto;
        text-align: center;
        box-shadow: var(--shadow-xl);
      }
      
      .login-card h1 {
        color: var(--color-primary);
        margin-bottom: var(--space-sm);
        font-size: 2rem;
      }
      
      .login-card h2 {
        color: var(--text-secondary);
        margin-bottom: var(--space-2xl);
        font-weight: 500;
      }
      
      .login-card .spa-form {
        text-align: left;
        max-width: none;
      }
      
      .login-card label {
        font-weight: 500;
        color: var(--text-primary);
        margin-bottom: var(--space-xs);
        display: block;
      }
    </style>
  </body>
</html>
