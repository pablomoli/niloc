name: Keep Database Active

on:
  schedule:
    # Run twice weekly: Monday and Thursday at 9 AM UTC
    - cron: '0 9 */3 * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  ping-database:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Ping health endpoint
        run: |
          echo "🏥 Pinging health endpoint to keep database active..."
          echo "URL: ${{ secrets.PRODUCTION_URL }}/api/health"
          
          response=$(curl -s -w "HTTPSTATUS:%{http_code}" \
            -X GET "${{ secrets.PRODUCTION_URL }}/api/health" \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5)
          
          # Extract HTTP status and body
          http_code=$(echo $response | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')
          body=$(echo $response | sed -e 's/HTTPSTATUS:.*//g')
          
          echo "📊 Response Status: $http_code"
          echo "📄 Response Body: $body"
          
          # Check if request was successful
          if [ $http_code -eq 200 ]; then
            echo "✅ Health check successful! Database is active."
          else
            echo "❌ Health check failed with status $http_code"
            exit 1
          fi
          
      - name: Log completion
        if: success()
        run: |
          echo "🎉 Keep-alive ping completed successfully at $(date -u)"
          echo "Next scheduled run: Monday or Thursday at 9 AM UTC"
